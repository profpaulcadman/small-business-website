name: Monthly index rebuild

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild index outputs
        run: python src/build_smallcap_index.py

      - name: Commit refreshed site data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated monthly FTSE SmallCap uncertainty update"
